<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <link rel="shortcut icon" href="/img/NSTpositivelogo.svg" type="image/x-icon">
    <title>NTS Solutions</title>
</head>

<body>
    <section class="section-container">
        <form class="form-container">
            <div class="sign-in-information">
                <a href="/index.html"><img src="/img/NSTpositivelogo.svg" alt="neutral-tech-solution-vector-logo"></a>
                <div class="e-section">
                    <h4>
                        Email
                    </h4>
                    <input type="text" placeholder="example@gmail.com">
                </div>
                <div class="pw-section">
                    <h4>
                        Password
                    </h4>
                    <input type="text" placeholder="Password">

                    <p><a href="#">Forgot password?</a></p>
                </div>
            </div>
            <button class="btn">
            Sign In
            </button>
            <div class="options-container">
                <h5>
                    or continue with
                </h5>
                <div class="triple-image-container">
                    <div class="three-class-container">
                        <img src="/img/google-logo.png" alt="google-sign-in-vector">
                    </div>
                    <div class="three-class-container">
                        <img src="/img/apple-logo.png" alt="apple-sign-in-vector">
                    </div>
                    <div class="three-class-container">
                        <img src="/img/github-logo.png" alt="github-sign-in-vector">
                    </div>
                </div>
                <h5>
                    Don't have an account? <a href="/signup.html"><span>Sign up here</span></a>
                </h5>
            </div>
        </form>
    </section>
</body>

</html>
