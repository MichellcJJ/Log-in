<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <link rel="shortcut icon" href="img/NSTpositivelogo.svg" type="image/x-icon">
    <title>NTS Solutions</title>
</head>

<body>
    <section class="section-container">
        <form action="signup-section" class="signup-container">
            <div class="media-container">
                <a href="index.html"><img src="img/NSTpositivelogo.svg" alt="neutral-tech-solution-vector-logo"
                        id="logo-nts"></a>
                <input type="text" placeholder="First name">
                <input type="text" placeholder="Last name">
                <input type="text" placeholder="Email">
                <input type="date" placeholder="Birth date">
                <input type="text" placeholder="Phone number">
                <input type="text" placeholder="Password">
                <input type="text" placeholder="Confirm password">
                <button class="sign_up_button">Sign Up</button>
                <p>Already have an account? <a href="signin.html"><span id="log-in-button">Log in</span></a></p>
                <div class="google_log_in">
                    <p>or</p>
                    <button href="#"><img src="img/google-logo.png" alt="Google logo">Sign up with
                        Google</button>
                </div>
            </div>
        </form>
    </section>
</body>

</html>
